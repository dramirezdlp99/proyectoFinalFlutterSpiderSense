name: spidersense
description: "Spider-Sense: Assistant for the visually impaired using Edge AI."
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  get: ^4.6.6

  supabase_flutter: ^2.0.2

  camera: ^0.11.0+2
  tflite_flutter: 0.11.0
  image: ^4.1.3
  flutter_tts: ^3.8.5
  vibration: ^2.0.0
  geolocator: ^13.0.2

  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2

  flutter_svg: ^2.0.9
  google_fonts: ^6.1.1
  permission_handler: ^11.3.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/langs/en-US.json
    - assets/langs/es-ES.json
    - assets/models/detect.tflite
    - assets/models/labelmap.txt